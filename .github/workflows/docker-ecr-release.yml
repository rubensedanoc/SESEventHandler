name: Docker ECR Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Semantic version to publish, for example 1.0.1"
        required: true

permissions:
  contents: read

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi

          if ! echo "$VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Version must follow semantic versioning like 1.0.1"
            exit 1
          fi

          echo "value=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Validate package.json version
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          RELEASE_VERSION="${{ steps.version.outputs.value }}"

          if [ "$PACKAGE_VERSION" != "$RELEASE_VERSION" ]; then
            echo "package.json version ($PACKAGE_VERSION) does not match release version ($RELEASE_VERSION)"
            exit 1
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image for amd64
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          VERSION: ${{ steps.version.outputs.value }}
        run: |
          IMAGE_URI="$REGISTRY/$ECR_REPOSITORY"
          docker buildx build \
            --platform linux/amd64 \
            --tag "$IMAGE_URI:$VERSION" \
            --tag "$IMAGE_URI:latest" \
            --push \
            .

      - name: Release summary
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          VERSION: ${{ steps.version.outputs.value }}
        run: |
          IMAGE_URI="$REGISTRY/$ECR_REPOSITORY"
          {
            echo "## Docker image published"
            echo ""
            echo "- Version: \`$VERSION\`"
            echo "- Platform: \`linux/amd64\`"
            echo "- Image: \`$IMAGE_URI:$VERSION\`"
            echo "- Latest: \`$IMAGE_URI:latest\`"
          } >> "$GITHUB_STEP_SUMMARY"
