apiVersion: v1
kind: ServiceAccount
metadata:
  name: ecr-secret-refresher
  namespace: prd
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ecr-secret-refresher
  namespace: prd
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ecr-secret-refresher
  namespace: prd
subjects:
  - kind: ServiceAccount
    name: ecr-secret-refresher
    namespace: prd
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: ecr-secret-refresher
