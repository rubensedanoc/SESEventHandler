apiVersion: apps/v1
kind: Deployment
metadata:
  name: ses-sns-events
  namespace: prd
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ses-sns-events
  template:
    metadata:
      labels:
        app: ses-sns-events
    spec:
      dnsPolicy: None
      dnsConfig:
        nameservers:
          - 8.8.8.8
          - 8.8.4.4
        searches:
          - prd.svc.cluster.local
          - svc.cluster.local
          - cluster.local
          - ps.d2.restaurant.pe
        options:
          - name: ndots
            value: "5"
      imagePullSecrets:
        - name: ecr-pull-secret
      containers:
        - name: ses-sns-events
          image: REPLACE_WITH_ECR_REGISTRY/REPLACE_WITH_ECR_REPOSITORY:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
              name: http
          envFrom:
            - configMapRef:
                name: ses-sns-events-config
            - secretRef:
                name: ses-sns-events-secrets
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
